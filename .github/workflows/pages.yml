name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 允许手动触发

# GitHub Pages 部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，新的取消旧的
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 纯静态站，无构建步骤
      # 未来如需扩展（如压缩 HTML、生成 sitemap），在此插入

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        continue-on-error: true
        # configure-pages 在某些新仓库上会因 Pages 端点状态失败，
        # 但只要仓库 Settings → Pages 已手动设为 GitHub Actions 即非必需。
        # 失败时跳过，让 upload/deploy 继续。

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: . # 整个仓库根作为站点根

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
